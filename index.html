<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Tic-Tac-Toe — Challenge a Friend</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0f0f1a;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #1a1a2e;
      padding: 30px;
      border-radius: 24px;
      border: 1px solid #2a2a4a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }
    h1 {
      text-align: center;
      color: #e94560;
      margin-top: 0;
      font-size: 28px;
    }
    .sub {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .status-bar {
      background: #0f0f1a;
      padding: 14px 18px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 18px;
      border-left: 4px solid #e94560;
    }
    .status-bar .highlight {
      color: #e94560;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      aspect-ratio: 1/1;
      max-width: 400px;
      margin: 0 auto 20px;
    }
    .cell {
      background: #0f0f1a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      border: 2px solid #2a2a4a;
      aspect-ratio: 1/1;
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: #252545;
      border-color: #e94560;
    }
    .cell.taken {
      cursor: default;
      opacity: 0.9;
    }
    .cell.x {
      color: #66d9ff;
    }
    .cell.o {
      color: #ff66b2;
    }
    .cell.win {
      background: #2a4a2a;
      border-color: #66ff66;
      box-shadow: 0 0 20px #66ff6644;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 16px 0;
    }
    button {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      flex: 1;
      min-width: 120px;
    }
    button:hover {
      background: #c73652;
      transform: scale(1.02);
    }
    button.secondary {
      background: #2a2a4a;
    }
    button.secondary:hover {
      background: #3a3a5a;
    }
    button.green {
      background: #2a7a4a;
    }
    button.green:hover {
      background: #3a9a5a;
    }
    .players {
      display: flex;
      justify-content: space-between;
      background: #0f0f1a;
      border-radius: 12px;
      padding: 12px 18px;
      margin-bottom: 14px;
      font-size: 14px;
      color: #aaa;
    }
    .players .you {
      color: #66d9ff;
    }
    .players .opponent {
      color: #ff66b2;
    }
    .players .waiting {
      color: #666;
    }
    .game-code {
      background: #0f0f1a;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-family: monospace;
      font-size: 20px;
      letter-spacing: 2px;
      color: #e94560;
      border: 1px dashed #2a2a4a;
      margin: 10px 0;
      word-break: break-all;
    }
    .game-code span {
      color: #eee;
    }
    .online-list {
      background: #0f0f1a;
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
      max-height: 150px;
      overflow-y: auto;
    }
    .online-list .title {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .online-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background: #1a1a2e;
      margin-bottom: 4px;
    }
    .online-item .name {
      color: #ccc;
    }
    .online-item .status {
      font-size: 12px;
      color: #66ff66;
    }
    .online-item .status.idle {
      color: #888;
    }
    .online-item button {
      padding: 2px 12px;
      font-size: 12px;
      min-width: auto;
      flex: 0;
    }
    .hidden {
      display: none !important;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a4a;
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: bold;
      border-left: 4px solid #e94560;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      z-index: 999;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    .footer {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin-top: 20px;
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0f0f1a;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <h1>🎮 Tic-Tac-Toe</h1>
  <div class="sub">Challenge someone on this site</div>

  <!-- Game Code Display -->
  <div class="game-code" id="gameCodeDisplay">
    📋 Game: <span id="gameCode">—</span>
  </div>

  <!-- Players -->
  <div class="players">
    <span class="you" id="playerX">❌ You (X)</span>
    <span class="waiting" id="playerO">⭕ Waiting for opponent...</span>
  </div>

  <!-- Status -->
  <div class="status-bar" id="status">🎯 Click <span class="highlight">New Game</span> to start</div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button onclick="createGame()">🆕 New Game</button>
    <button onclick="joinGame()" class="secondary">🔗 Join with Code</button>
    <button onclick="resetGame()" class="secondary">🔄 Reset</button>
  </div>

  <!-- Online Players -->
  <div class="online-list" id="onlineList">
    <div class="title">👥 Online & Available</div>
    <div id="onlinePlayers">
      <div style="color:#666; text-align:center; padding:8px;">No one else is online yet.<br>Open this page in another tab to test!</div>
    </div>
  </div>

  <div class="footer">💡 Open in multiple tabs to test multiplayer · All data stays in your browser</div>
</div>

<script>
  // ============================================
  //  TIC-TAC-TOE + MULTIPLAYER (same browser)
  //  Uses BroadcastChannel API for tab-to-tab
  //  + localStorage for persistence
  // ============================================

  const BOARD_SIZE = 9;
  let board = Array(9).fill(null);
  let currentPlayer = 'X'; // 'X' always starts
  let gameActive = false;
  let gameId = null;
  let playerSymbol = 'X'; // what this tab is
  let opponentSymbol = 'O';
  let gameOver = false;
  let myTurn = false;

  // Channel for cross-tab communication
  let channel = null;
  let channelReady = false;

  // DOM refs
  const cells = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const gameCodeEl = document.getElementById('gameCode');
  const playerXEl = document.getElementById('playerX');
  const playerOEl = document.getElementById('playerO');
  const onlinePlayersEl = document.getElementById('onlinePlayers');

  // ========== INIT ==========
  function init() {
    // Try to restore game from localStorage
    const saved = localStorage.getItem('ttt_game');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.board && data.gameId) {
          board = data.board;
          gameId = data.gameId;
          currentPlayer = data.currentPlayer || 'X';
          gameActive = data.gameActive || false;
          gameOver = data.gameOver || false;
          playerSymbol = data.playerSymbol || 'X';
          opponentSymbol = playerSymbol === 'X' ? 'O' : 'X';
          renderBoard();
          updateStatus();
          updatePlayers();
          if (gameId) gameCodeEl.textContent = gameId;
        }
      } catch (e) {}
    }

    // Setup BroadcastChannel
    try {
      channel = new BroadcastChannel('ttt_channel');
      channel.onmessage = handleChannelMessage;
      channelReady = true;
      // Announce presence
      announcePresence();
    } catch (e) {
      console.log('BroadcastChannel not supported — multiplayer limited');
    }

    // Update online list periodically
    updateOnlineList();
    setInterval(updateOnlineList, 5000);

    // Click listeners
    cells.forEach((cell, idx) => {
      cell.addEventListener('click', () => handleCellClick(idx));
    });

    // Auto-join if we have a gameId
    if (gameId && !gameActive) {
      // We're in a game but not active — try to join
      joinGameById(gameId);
    }
  }

  // ========== CHANNEL MESSAGES ==========
  function handleChannelMessage(e) {
    const msg = e.data;
    if (!msg || !msg.type) return;

    switch (msg.type) {
      case 'presence':
        // Someone is online
        updateOnlineList();
        break;

      case 'move':
        // Opponent made a move
        if (msg.gameId === gameId && msg.symbol !== playerSymbol) {
          if (!gameOver && gameActive) {
            board[msg.index] = msg.symbol;
            currentPlayer = msg.symbol === 'X' ? 'O' : 'X';
            renderBoard();
            checkGameState();
            saveGame();
            updateStatus();
            announcePresence();
          }
        }
        break;

      case 'game_created':
        // Someone created a new game — refresh list
        updateOnlineList();
        break;

      case 'game_joined':
        // Someone joined our game
        if (msg.gameId === gameId && msg.joinerSymbol === opponentSymbol) {
          gameActive = true;
          gameOver = false;
          myTurn = (playerSymbol === 'X'); // X always starts
          saveGame();
          updateStatus();
          updatePlayers();
          showToast('🎉 Opponent joined! Game on!');
        }
        break;

      case 'game_reset':
        if (msg.gameId === gameId) {
          resetBoard(true);
          showToast('🔄 Game was reset by opponent');
        }
        break;

      case 'game_abandoned':
        if (msg.gameId === gameId) {
          gameActive = false;
          gameOver = true;
          statusEl.innerHTML = '😢 Opponent left the game. Start a new one.';
          saveGame();
        }
        break;

      case 'ping':
        // Respond to ping
        if (channelReady) {
          channel.postMessage({ type: 'pong', from: 'tab_' + Date.now() });
        }
        break;
    }
  }

  function announcePresence() {
    if (!channelReady) return;
    channel.postMessage({
      type: 'presence',
      gameId: gameId || null,
      timestamp: Date.now()
    });
  }

  // ========== CREATE / JOIN ==========
  function createGame() {
    // Generate a short game code
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    gameId = code;
    gameCodeEl.textContent = gameId;

    // Reset board
    resetBoard(true);
    gameActive = false;
    gameOver = false;
    playerSymbol = 'X';
    opponentSymbol = 'O';
    currentPlayer = 'X';
    myTurn = true;

    // Save
    saveGame();
    updatePlayers();
    updateStatus();
    renderBoard();

    showToast('🆕 Game created! Share the code: ' + gameId);
    announcePresence();

    // Broadcast that a game was created
    if (channelReady) {
      channel.postMessage({ type: 'game_created', gameId: gameId });
    }

    // Auto-join check — maybe someone is waiting
    setTimeout(() => {
      // See if any other tab has this game ID already
      updateOnlineList();
    }, 500);
  }

  function joinGame() {
    const code = prompt('Enter the game code:', gameId || '');
    if (!code || code.trim().length < 4) return;
    joinGameById(code.trim().toUpperCase());
  }

  function joinGameById(code) {
    // Check if we can join — we'll just set our state
    // In a real implementation, we'd check if the game exists.
    // Here we assume it does.
    gameId = code;
    gameCodeEl.textContent = gameId;

    // We join as 'O'
    playerSymbol = 'O';
    opponentSymbol = 'X';
    gameActive = true;
    gameOver = false;
    myTurn = false; // X goes first
    currentPlayer = 'X';

    // Reset board
    board = Array(9).fill(null);
    renderBoard();

    saveGame();
    updatePlayers();
    updateStatus();

    showToast('🔗 Joined game ' + gameId + ' as O');

    // Broadcast join
    if (channelReady) {
      channel.postMessage({
        type: 'game_joined',
        gameId: gameId,
        joinerSymbol: 'O'
      });
    }
    announcePresence();
  }

  // ========== GAME LOGIC ==========
  function handleCellClick(index) {
    if (!gameActive || gameOver) {
      showToast('⏳ Game not active. Start or join a game first.');
      return;
    }
    if (!myTurn) {
      showToast('⏳ Waiting for opponent...');
      return;
    }
    if (board[index] !== null) {
      showToast('❌ That cell is taken!');
      return;
    }

    // Make move
    board[index] = playerSymbol;
    renderBoard();

    // Check win
    const win = checkWin(board);
    if (win) {
      gameOver = true;
      gameActive = false;
      highlightWin(win);
      statusEl.innerHTML = '🏆 You win! 🎉';
      saveGame();
      announcePresence();
      return;
    }

    // Check tie
    if (board.every(c => c !== null)) {
      gameOver = true;
      gameActive = false;
      statusEl.innerHTML = '🤝 It\'s a tie!';
      saveGame();
      announcePresence();
      return;
    }

    // Switch turn
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    myTurn = (currentPlayer === playerSymbol);
    updateStatus();
    saveGame();
    announcePresence();

    // Broadcast move
    if (channelReady) {
      channel.postMessage({
        type: 'move',
        gameId: gameId,
        index: index,
        symbol: playerSymbol
      });
    }

    // Check if opponent is still there (pong test)
    if (channelReady) {
      channel.postMessage({ type: 'ping' });
    }
  }

  function checkWin(board) {
    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    for (let line of lines) {
      const [a,b,c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return line;
      }
    }
    return null;
  }

  function highlightWin(line) {
    if (!line) return;
    line.forEach(idx => {
      cells[idx].classList.add('win');
    });
    // Mark win on board for render
  }

  function checkGameState() {
    const win = checkWin(board);
    if (win) {
      gameOver = true;
      gameActive = false;
      highlightWin(win);
      const winner = board[win[0]];
      if (winner === playerSymbol) {
        statusEl.innerHTML = '🏆 You win! 🎉';
      } else if (winner) {
        statusEl.innerHTML = '😅 Opponent wins!';
      }
      saveGame();
      return true;
    }
    if (board.every(c => c !== null)) {
      gameOver = true;
      gameActive = false;
      statusEl.innerHTML = '🤝 It\'s a tie!';
      saveGame();
      return true;
    }
    return false;
  }

  function resetBoard(silent = false) {
    board = Array(9).fill(null);
    gameOver = false;
    currentPlayer = 'X';
    myTurn = (playerSymbol === 'X');
    cells.forEach(c => c.classList.remove('win', 'x', 'o', 'taken'));
    renderBoard();
    updateStatus();
    if (!silent) {
      saveGame();
      if (channelReady) {
        channel.postMessage({ type: 'game_reset', gameId: gameId });
      }
    }
  }

  function resetGame() {
    if (!gameId) {
      createGame();
      return;
    }
    resetBoard(false);
    showToast('🔄 Game reset');
  }

  // ========== RENDER ==========
  function renderBoard() {
    cells.forEach((cell, idx) => {
      const val = board[idx];
      cell.textContent = val || '';
      cell.className = 'cell';
      if (val) {
        cell.classList.add('taken', val === 'X' ? 'x' : 'o');
      }
    });
  }

  function updateStatus() {
    if (!gameId) {
      statusEl.innerHTML = '🎯 Click <span class="highlight">New Game</span> to start';
      return;
    }
    if (gameOver) {
      // status already set
      return;
    }
    if (!gameActive) {
      statusEl.innerHTML = '⏳ Waiting for opponent to join... Share code: <span class="highlight">' + gameId + '</span>';
      return;
    }
    if (myTurn) {
      statusEl.innerHTML = '🎯 Your turn (' + playerSymbol + ')';
    } else {
      statusEl.innerHTML = '⏳ Waiting for opponent...';
    }
  }

  function updatePlayers() {
    if (playerSymbol === 'X') {
      playerXEl.innerHTML = '❌ You (X)';
      playerOEl.innerHTML = '⭕ ' + (gameActive ? 'Opponent (O)' : 'Waiting for opponent...');
      playerOEl.className = gameActive ? 'opponent' : 'waiting';
    } else {
      playerXEl.innerHTML = '❌ ' + (gameActive ? 'Opponent (X)' : 'Waiting for opponent...');
      playerXEl.className = gameActive ? 'opponent' : 'waiting';
      playerOEl.innerHTML = '⭕ You (O)';
      playerOEl.className = 'you';
    }
  }

  // ========== SAVE ==========
  function saveGame() {
    const data = {
      board: board,
      gameId: gameId,
      currentPlayer: currentPlayer,
      gameActive: gameActive,
      gameOver: gameOver,
      playerSymbol: playerSymbol
    };
    localStorage.setItem('ttt_game', JSON.stringify(data));
  }

  // ========== ONLINE LIST ==========
  function updateOnlineList() {
    // We can't actually see other tabs directly, but we can simulate
    // by checking if there are other BroadcastChannel instances.
    // For simplicity, we'll just show a placeholder.
    // In a real app, you'd use a server.
    // We'll show that the feature exists but is local-only.
    const tabs = getOtherTabs();
    if (tabs.length === 0) {
      onlinePlayersEl.innerHTML = `
        <div style="color:#666; text-align:center; padding:8px;">
          👋 No one else is online right now.<br>
          <small>Open this page in another tab to test multiplayer!</small>
        </div>
      `;
    } else {
      let html = '';
      tabs.forEach(tab => {
        const isPlaying = tab.gameId === gameId && tab.gameId;
        html += `
          <div class="online-item">
            <span class="name">${tab.name}</span>
            <span class="status ${isPlaying ? '' : 'idle'}">
              ${isPlaying ? '🎮 In your game' : '🟢 Available'}
            </span>
            ${!isPlaying && tab.gameId ? `<button onclick="joinGameById('${tab.gameId}')" class="secondary" style="padding:2px 10px;font-size:11px;">Join</button>` : ''}
          </div>
        `;
      });
      onlinePlayersEl.innerHTML = html;
    }
  }

  function getOtherTabs() {
    // This is a simulation — in reality, we'd track via BroadcastChannel
    // We'll just return an empty array and let the user know how it works.
    // For demo, we'll check if there's any other tab with a game.
    const saved = localStorage.getItem('ttt_game');
    const otherTabs = [];
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.gameId && data.gameId !== gameId) {
          otherTabs.push({
            name: 'Player ' + data.gameId.slice(-3),
            gameId: data.gameId
          });
        }
      } catch (e) {}
    }
    // Add a dummy if no other tabs found but we want to show the UI
    if (otherTabs.length === 0 && channelReady) {
      // Check if we have a game but no opponent
      if (gameId && !gameActive) {
        // Show a "fake" player to demonstrate the UI
        // In reality, they'd need to open another tab.
        otherTabs.push({
          name: '👤 (open this in another tab)',
          gameId: gameId
        });
      }
    }
    return otherTabs;
  }

  // ========== TOAST ==========
  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== START ==========
  init();

  // If there's a game code but no game active, show status
  if (gameId && !gameActive) {
    statusEl.innerHTML = '⏳ Waiting for opponent to join... Share code: <span class="highlight">' + gameId + '</span>';
  }
</script>

</body>
</html>
