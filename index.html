<!DOCTYPE html>
<html>
<head>
  <title>Link Maker</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
    input, button { padding: 10px; width: 100%; margin: 6px 0; }
    .output { background: #f0f0f0; padding: 12px; margin-top: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>🔗 Custom Link Maker</h2>
  <input id="base" placeholder="Base URL (e.g., https://example.com)" value="https://example.com">
  <input id="param1" placeholder="Parameter 1 (e.g., id=123)">
  <input id="param2" placeholder="Parameter 2 (e.g., ref=home)">
  <button onclick="generateLink()">Generate Link</button>
  <div class="output" id="output">Your link will appear here</div>

  <script>
    function generateLink() {
      const base = document.getElementById('base').value.trim();
      const p1 = document.getElementById('param1').value.trim();
      const p2 = document.getElementById('param2').value.trim();
      let link = base;
      let params = [];
      if (p1) params.push(p1);
      if (p2) params.push(p2);
      if (params.length > 0) link += '?' + params.join('&');
      document.getElementById('output').innerHTML = `<a href="${link}" target="_blank">${link}</a>`;
    }
  </script>
</body>
</html>
