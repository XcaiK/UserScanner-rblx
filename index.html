<!DOCTYPE html>
<html>
<head>
    <title>Verify you're human</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background: #1a1a2e;
            color: white;
        }
        .captcha-box {
            background: #16213e;
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            margin: 0 auto;
            border: 2px solid #0f3460;
        }
        .captcha-img {
            background: #2a3a5c;
            padding: 20px;
            border-radius: 8px;
            font-size: 32px;
            letter-spacing: 10px;
            font-family: monospace;
            margin: 20px 0;
            color: #a8d8ea;
        }
        input {
            padding: 12px;
            width: 80%;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            margin-top: 15px;
            padding: 12px 40px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #c73a54;
        }
        .counter {
            font-size: 14px;
            color: #888;
            margin-top: 15px;
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: #f5a623;
        }
    </style>
</head>
<body>

    <div class="captcha-box" id="captchaBox">
        <h2>🔒 Verify you're human</h2>
        <p style="color:#aaa; font-size:14px;">Complete all CAPTCHAs to continue</p>

        <div class="captcha-img" id="captchaText">A7K2</div>

        <input type="text" id="userInput" placeholder="Type the code above" autofocus>

        <button onclick="checkCaptcha()">✔ Verify</button>

        <div class="counter" id="counter">Attempt 1 / 100</div>
        <div class="loading" id="loading">⏳ Verifying...</div>
    </div>

    <script>
        let attempts = 0;
        const maxAttempts = 100;
        const captchaBox = document.getElementById('captchaBox');
        const counter = document.getElementById('counter');
        const loading = document.getElementById('loading');
        const userInput = document.getElementById('userInput');
        const captchaDisplay = document.getElementById('captchaText');

        // Generate random 4-char CAPTCHA
        function generateCaptcha() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        let currentCaptcha = generateCaptcha();
        captchaDisplay.textContent = currentCaptcha;

        function checkCaptcha() {
            const userText = userInput.value.trim().toUpperCase();

            if (userText === currentCaptcha) {
                // Correct — increment and check
                attempts++;

                if (attempts >= maxAttempts) {
                    // FINAL: close tab
                    window.close();
                    // Fallback if close fails
                    document.body.innerHTML = '<h1 style="color:white;margin-top:100px;">✅ Verified!<br><small>(Tab will close now...)</small></h1>';
                    setTimeout(() => window.close(), 500);
                    return;
                }

                // Show loading flicker
                loading.style.display = 'block';
                counter.textContent = `Attempt ${attempts + 1} / ${maxAttempts}`;
                userInput.value = '';
                userInput.disabled = true;

                setTimeout(() => {
                    // Generate new CAPTCHA
                    currentCaptcha = generateCaptcha();
                    captchaDisplay.textContent = currentCaptcha;
                    loading.style.display = 'none';
                    userInput.disabled = false;
                    userInput.focus();
                }, 800);

            } else {
                // Wrong — shake effect
                captchaBox.style.borderColor = '#e94560';
                userInput.value = '';
                userInput.placeholder = '❌ Wrong, try again';
                setTimeout(() => {
                    captchaBox.style.borderColor = '#0f3460';
                    userInput.placeholder = 'Type the code above';
                }, 1000);
            }
        }

        // Enter key support
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkCaptcha();
        });

        // Prevent right-click / inspect (just for fun)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>

</body>
</html>
