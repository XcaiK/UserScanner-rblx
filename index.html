<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Tic-Tac-Toe — Play with Friends</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      background: #0f0f1a;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: #1a1a2e;
      padding: 28px;
      border-radius: 24px;
      border: 1px solid #2a2a4a;
    }
    h1 {
      text-align: center;
      color: #e94560;
      margin: 0 0 4px 0;
      font-size: 26px;
    }
    .sub {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .status-bar {
      background: #0f0f1a;
      padding: 12px 16px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #e94560;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-bar .highlight {
      color: #e94560;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      aspect-ratio: 1/1;
      max-width: 380px;
      margin: 0 auto 16px;
    }
    .cell {
      background: #0f0f1a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      border: 2px solid #2a2a4a;
      aspect-ratio: 1/1;
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: #252545;
      border-color: #e94560;
    }
    .cell.taken {
      cursor: default;
      opacity: 0.9;
    }
    .cell.x {
      color: #66d9ff;
    }
    .cell.o {
      color: #ff66b2;
    }
    .cell.win {
      background: #2a4a2a;
      border-color: #66ff66;
      box-shadow: 0 0 20px #66ff6644;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }
    button {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      flex: 1;
      min-width: 100px;
    }
    button:hover {
      background: #c73652;
      transform: scale(1.02);
    }
    button.secondary {
      background: #2a2a4a;
    }
    button.secondary:hover {
      background: #3a3a5a;
    }
    button.green {
      background: #2a7a4a;
    }
    button.green:hover {
      background: #3a9a5a;
    }
    .room-box {
      background: #0f0f1a;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      margin: 10px 0;
      border: 1px dashed #2a2a4a;
    }
    .room-box .code {
      font-family: monospace;
      font-size: 28px;
      letter-spacing: 4px;
      color: #e94560;
      font-weight: bold;
    }
    .room-box .label {
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .join-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .join-row input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0f0f1a;
      color: #fff;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      font-family: monospace;
    }
    .join-row input::placeholder {
      color: #444;
      font-size: 14px;
      letter-spacing: 0;
    }
    .players {
      display: flex;
      justify-content: space-between;
      background: #0f0f1a;
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #aaa;
    }
    .players .you {
      color: #66d9ff;
    }
    .players .opponent {
      color: #ff66b2;
    }
    .players .waiting {
      color: #666;
    }
    .footer {
      text-align: center;
      color: #444;
      font-size: 11px;
      margin-top: 16px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a4a;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: bold;
      border-left: 4px solid #e94560;
      z-index: 999;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .connection-status {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin: 4px 0 10px 0;
    }
    .connection-status.connected {
      color: #66ff66;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎮 Tic-Tac-Toe</h1>
  <div class="sub">Play with anyone, anywhere</div>

  <!-- Room -->
  <div class="room-box" id="roomBox">
    <div class="label">🏠 Your Room Code</div>
    <div class="code" id="roomCode">—</div>
    <div style="margin-top:6px; font-size:13px; color:#666;" id="connectionStatus">🔴 Not connected</div>
    <button onclick="copyRoomCode()" class="secondary" style="margin-top:8px; padding:6px 12px; font-size:12px; flex:0;">📋 Copy Code</button>
  </div>

  <!-- Join section -->
  <div style="display:flex; gap:8px; margin:10px 0;">
    <input id="joinInput" placeholder="Enter room code to join" style="flex:1; padding:12px; border-radius:10px; border:none; background:#0f0f1a; color:#fff; font-family:monospace; font-size:18px; text-align:center; letter-spacing:2px;">
    <button onclick="joinRoom()" style="flex:0; padding:12px 24px;">Join</button>
  </div>

  <!-- Players -->
  <div class="players">
    <span class="you" id="playerX">❌ You (X)</span>
    <span class="waiting" id="playerO">⭕ Waiting for opponent...</span>
  </div>

  <!-- Status -->
  <div class="status-bar" id="status">🎯 Create or join a room to start</div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button onclick="createRoom()">🆕 Create Room</button>
    <button onclick="resetGame()" class="secondary">🔄 Reset</button>
    <button onclick="leaveGame()" class="secondary" style="background:#4a1a1a;">🚪 Leave</button>
  </div>

  <div class="footer">💡 Send the room code to a friend. They paste it and click Join.</div>
</div>

<script>
  // ============================================================
  //  TIC-TAC-TOE with PEERJS — real multiplayer across devices
  // ============================================================

  let peer = null;
  let conn = null;
  let roomId = null;
  let isHost = false;

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let playerSymbol = 'X';
  let opponentSymbol = 'O';
  let gameActive = false;
  let gameOver = false;
  let myTurn = false;

  const cells = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const roomCodeEl = document.getElementById('roomCode');
  const connectionStatusEl = document.getElementById('connectionStatus');
  const playerXEl = document.getElementById('playerX');
  const playerOEl = document.getElementById('playerO');
  const joinInput = document.getElementById('joinInput');

  let peerId = null;

  // ========== PEERJS INIT ==========
  function initPeer() {
    peer = new Peer({
      debug: 2,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      }
    });

    peer.on('open', (id) => {
      peerId = id;
      console.log('Peer ID:', id);
      // Auto-create a room if none exists
      if (!roomId) {
        // Just show the ID — user clicks Create Room
      }
      updateConnectionStatus('🟢 Ready');
    });

    peer.on('connection', (incoming) => {
      // Someone is connecting to us
      if (conn) {
        incoming.close();
        showToast('❌ Already in a game');
        return;
      }
      conn = incoming;
      setupConnection();
      isHost = true;
      playerSymbol = 'X';
      opponentSymbol = 'O';
      gameActive = true;
      gameOver = false;
      myTurn = true;
      currentPlayer = 'X';
      board = Array(9).fill(null);
      renderBoard();
      updatePlayers();
      updateStatus();
      showToast('🎉 Opponent joined! You are X');
      updateConnectionStatus('🟢 Connected');
      sendState();
    });

    peer.on('error', (err) => {
      console.log('Peer error:', err);
      if (err.type === 'peer-unavailable') {
        showToast('❌ Room not found. Check the code.');
      }
    });

    // Auto-generate a peer ID for room code
    // We'll use the peer ID as the room code
  }

  function setupConnection() {
    conn.on('open', () => {
      console.log('Connection open');
      updateConnectionStatus('🟢 Connected');
      if (!isHost) {
        // We joined — request state
        sendMessage({ type: 'sync_request' });
      }
    });

    conn.on('data', (data) => {
      handleMessage(data);
    });

    conn.on('close', () => {
      showToast('🔌 Opponent disconnected');
      updateConnectionStatus('🔴 Disconnected');
      gameActive = false;
      conn = null;
      statusEl.innerHTML = '💔 Opponent left. Create a new room.';
    });
  }

  // ========== CREATE / JOIN ==========
  function createRoom() {
    if (!peer) {
      showToast('⏳ Connecting... wait a second');
      return;
    }
    if (conn) {
      showToast('Already in a game. Leave first.');
      return;
    }
    roomId = peerId;
    roomCodeEl.textContent = roomId;
    isHost = true;
    playerSymbol = 'X';
    opponentSymbol = 'O';
    gameActive = false;
    gameOver = false;
    myTurn = false;
    board = Array(9).fill(null);
    renderBoard();
    updatePlayers();
    statusEl.innerHTML = '⏳ Waiting for opponent to join...';
    updateConnectionStatus('🟡 Waiting for player...');
    showToast('🆕 Room created! Share the code.');
  }

  function joinRoom() {
    const code = joinInput.value.trim();
    if (!code) {
      showToast('Please enter a room code');
      return;
    }
    if (!peer) {
      showToast('⏳ Still connecting... try again in 2s');
      return;
    }
    if (conn) {
      showToast('Already in a game. Leave first.');
      return;
    }

    roomId = code;
    roomCodeEl.textContent = roomId;
    isHost = false;
    playerSymbol = 'O';
    opponentSymbol = 'X';
    gameActive = false;
    gameOver = false;
    myTurn = false;

    // Connect to the host
    conn = peer.connect(code, { reliable: true });
    setupConnection();

    updateConnectionStatus('🟡 Connecting...');
    statusEl.innerHTML = '⏳ Connecting to ' + code + '...';
  }

  function joinRoomWithCode(code) {
    joinInput.value = code;
    joinRoom();
  }

  function copyRoomCode() {
    if (!roomId) {
      showToast('Create a room first');
      return;
    }
    navigator.clipboard.writeText(roomId).then(() => {
      showToast('✅ Room code copied!');
    }).catch(() => {
      // Fallback
      const input = document.createElement('input');
      input.value = roomId;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
      showToast('✅ Copied!');
    });
  }

  function leaveGame() {
    if (conn) {
      conn.close();
      conn = null;
    }
    roomId = null;
    roomCodeEl.textContent = '—';
    gameActive = false;
    gameOver = false;
    board = Array(9).fill(null);
    renderBoard();
    updatePlayers();
    statusEl.innerHTML = '🎯 Create or join a room to start';
    updateConnectionStatus('🔴 Not connected');
    showToast('🚪 Left the game');
  }

  // ========== MESSAGING ==========
  function sendMessage(msg) {
    if (conn && conn.open) {
      conn.send(msg);
    }
  }

  function sendState() {
    sendMessage({
      type: 'state',
      board: board,
      currentPlayer: currentPlayer,
      gameActive: gameActive,
      gameOver: gameOver,
      playerSymbol: playerSymbol // our symbol
    });
  }

  function handleMessage(data) {
    switch (data.type) {
      case 'sync_request':
        // Send our state to the joiner
        sendState();
        break;

      case 'state':
        // Receive full state
        board = data.board;
        currentPlayer = data.currentPlayer;
        gameActive = data.gameActive;
        gameOver = data.gameOver;
        // Determine our turn
        myTurn = (currentPlayer === playerSymbol);
        renderBoard();
        updateStatus();
        updatePlayers();
        // Check win state
        const win = checkWin(board);
        if (win && gameOver) {
          highlightWin(win);
          const winner = board[win[0]];
          if (winner === playerSymbol) {
            statusEl.innerHTML = '🏆 You win! 🎉';
          } else if (winner) {
            statusEl.innerHTML = '😅 Opponent wins!';
          } else {
            statusEl.innerHTML = '🤝 It\'s a tie!';
          }
        } else if (gameOver) {
          statusEl.innerHTML = '🤝 Game over';
        } else if (gameActive) {
          updateStatus();
        }
        showToast('📥 Game state synced');
        break;

      case 'move':
        if (!gameActive || gameOver) break;
        const idx = data.index;
        const symbol = data.symbol;
        if (symbol === playerSymbol) break; // ignore our own moves (echo)
        if (board[idx] !== null) break;
        board[idx] = symbol;
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        myTurn = (currentPlayer === playerSymbol);
        renderBoard();
        const winResult = checkWin(board);
        if (winResult) {
          gameOver = true;
          gameActive = false;
          highlightWin(winResult);
          const winner = board[winResult[0]];
          if (winner === playerSymbol) {
            statusEl.innerHTML = '🏆 You win! 🎉';
          } else if (winner) {
            statusEl.innerHTML = '😅 Opponent wins!';
          }
        } else if (board.every(c => c !== null)) {
          gameOver = true;
          gameActive = false;
          statusEl.innerHTML = '🤝 It\'s a tie!';
        } else {
          updateStatus();
        }
        break;

      case 'reset':
        board = Array(9).fill(null);
        gameOver = false;
        gameActive = true;
        currentPlayer = 'X';
        myTurn = (playerSymbol === 'X');
        renderBoard();
        cells.forEach(c => c.classList.remove('win'));
        updateStatus();
        showToast('🔄 Game reset');
        break;

      case 'leave':
        showToast('🔌 Opponent left the game');
        conn = null;
        gameActive = false;
        statusEl.innerHTML = '💔 Opponent left. Create a new room.';
        updateConnectionStatus('🔴 Disconnected');
        break;
    }
  }

  // ========== GAME LOGIC ==========
  function handleCellClick(index) {
    if (!gameActive || gameOver) {
      showToast('⏳ Game not active');
      return;
    }
    if (!myTurn) {
      showToast('⏳ Waiting for opponent...');
      return;
    }
    if (board[index] !== null) {
      showToast('❌ Cell taken');
      return;
    }

    // Make move
    board[index] = playerSymbol;
    renderBoard();

    // Check win
    const win = checkWin(board);
    if (win) {
      gameOver = true;
      gameActive = false;
      highlightWin(win);
      statusEl.innerHTML = '🏆 You win! 🎉';
      sendMessage({ type: 'move', index: index, symbol: playerSymbol });
      return;
    }

    // Check tie
    if (board.every(c => c !== null)) {
      gameOver = true;
      gameActive = false;
      statusEl.innerHTML = '🤝 It\'s a tie!';
      sendMessage({ type: 'move', index: index, symbol: playerSymbol });
      return;
    }

    // Switch turn
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    myTurn = (currentPlayer === playerSymbol);
    updateStatus();

    // Send move
    sendMessage({ type: 'move', index: index, symbol: playerSymbol });
  }

  function checkWin(board) {
    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    for (let line of lines) {
      const [a,b,c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return line;
      }
    }
    return null;
  }

  function highlightWin(line) {
    if (!line) return;
    line.forEach(idx => cells[idx].classList.add('win'));
  }

  function resetGame() {
    if (!conn || !conn.open) {
      showToast('Not connected to anyone');
      return;
    }
    board = Array(9).fill(null);
    gameOver = false;
    gameActive = true;
    currentPlayer = 'X';
    myTurn = (playerSymbol === 'X');
    cells.forEach(c => c.classList.remove('win'));
    renderBoard();
    updateStatus();
    sendMessage({ type: 'reset' });
  }

  // ========== RENDER ==========
  function renderBoard() {
    cells.forEach((cell, idx) => {
      const val = board[idx];
      cell.textContent = val || '';
      cell.className = 'cell';
      if (val) {
        cell.classList.add('taken', val === 'X' ? 'x' : 'o');
      }
    });
  }

  function updateStatus() {
    if (!roomId) {
      statusEl.innerHTML = '🎯 Create or join a room to start';
      return;
    }
    if (!conn || !conn.open) {
      statusEl.innerHTML = '⏳ Waiting for opponent...';
      return;
    }
    if (gameOver) {
      return;
    }
    if (!gameActive) {
      statusEl.innerHTML = '⏳ Waiting for game to start...';
      return;
    }
    if (myTurn) {
      statusEl.innerHTML = '🎯 Your turn (' + playerSymbol + ')';
    } else {
      statusEl.innerHTML = '⏳ Waiting for opponent...';
    }
  }

  function updatePlayers() {
    if (playerSymbol === 'X') {
      playerXEl.innerHTML = '❌ You (X)';
      playerOEl.innerHTML = '⭕ ' + (conn && conn.open ? 'Opponent (O)' : 'Waiting...');
      playerOEl.className = (conn && conn.open) ? 'opponent' : 'waiting';
    } else {
      playerXEl.innerHTML = '❌ ' + (conn && conn.open ? 'Opponent (X)' : 'Waiting...');
      playerXEl.className = (conn && conn.open) ? 'opponent' : 'waiting';
      playerOEl.innerHTML = '⭕ You (O)';
      playerOEl.className = 'you';
    }
  }

  function updateConnectionStatus(text) {
    connectionStatusEl.textContent = text;
    connectionStatusEl.className = 'connection-status';
    if (text.includes('Connected')) {
      connectionStatusEl.classList.add('connected');
    }
  }

  // ========== TOAST ==========
  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== CELL CLICKS ==========
  cells.forEach((cell, idx) => {
    cell.addEventListener('click', () => handleCellClick(idx));
  });

  // Enter key on join input
  joinInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinRoom();
  });

  // ========== INIT ==========
  initPeer();

  // Show a help message after a moment
  setTimeout(() => {
    if (!roomId) {
      statusEl.innerHTML = '🎯 Click <span class="highlight">Create Room</span> or enter a code to join';
    }
  }, 1000);

  // Auto-join from URL param ?room=CODE
  const params = new URLSearchParams(window.location.search);
  const roomParam = params.get('room');
  if (roomParam) {
    setTimeout(() => {
      joinInput.value = roomParam;
      joinRoom();
    }, 1500);
  }

  console.log('🎮 Tic-Tac-Toe Multiplayer');
  console.log('Share your room code with a friend!');
</script>

</body>
</html>
